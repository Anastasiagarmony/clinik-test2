!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ветеринарная клиника «Доктор Кот» — Суздаль</title>
    <meta
        name="description"
        content="Ветеринарная клиника «Доктор Кот» в Суздале. Точная диагностика, профессиональное лечение и бережное отношение."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:wght@400;600;700;900&display=swap"
        rel="stylesheet"
    />

    <style>
        :root {
            --bg: #ffffff;
            --bg-blue: #f4f9fd;
            --bg-blue-soft: #e8f2fa;
            --bg-blue-card: #dbe9f5;
            --bg-blue-card-soft: #edf4fa;
            --bg-warm: #fff7ef;
            --text: #24395a;
            --text-deep: #203246;
            --text-muted: #65758f;
            --text-soft: #4e6578;
            --accent: #0a7db9;
            --accent-hover: #086a9c;
            --accent-pale: #dcecf8;
            --orange: #efa734;
            --orange-soft: #f7d6a8;
            --orange-pale: #fff1dc;
            --border: #dbe4ee;
            --card: #ffffff;
            --shadow: 0 16px 40px rgba(36, 57, 90, 0.08);
            --shadow-soft: 0 10px 28px rgba(36, 57, 90, 0.06);
            --shadow-glow: 0 14px 30px rgba(10, 125, 185, 0.14), 0 0 0 8px rgba(239, 167, 52, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        body {
            font-family: "DM Sans", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: "Fraunces", serif;
            font-weight: 700;
            line-height: 1.14;
            color: var(--text);
        }

        .nav {
            position: fixed;
            inset: 0 0 auto 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            transition: box-shadow 0.3s ease, background 0.3s ease;
        }

        .nav.scrolled {
            box-shadow: 0 10px 28px rgba(36, 57, 90, 0.06);
        }

        .nav-link {
            position: relative;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 1.06rem;
            transition: color 0.25s ease;
        }

        .nav-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.25s ease;
        }

        .nav-link:hover {
            color: var(--accent);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .top-phone-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--accent);
            color: #fff;
            padding: 14px 22px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            box-shadow: 0 10px 24px rgba(10, 125, 185, 0.18);
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            white-space: nowrap;
        }

        .top-phone-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 12px 28px rgba(10, 125, 185, 0.22);
        }

        .hero {
            padding-top: 148px;
            padding-bottom: 84px;
            background:
                radial-gradient(circle at 12% 16%, rgba(10, 125, 185, 0.05) 0%, transparent 24%),
                radial-gradient(circle at 88% 18%, rgba(239, 167, 52, 0.06) 0%, transparent 22%),
                #ffffff;
        }

        .section-blue {
            background: var(--bg-blue);
        }

        .section-warm {
            background: var(--bg-warm);
        }

        .section-header {
            max-width: 860px;
            text-align: center;
            margin: 0 auto 56px;
        }

        .hero-badge,
        .section-badge,
        .hero-subline {
            display: inline-flex;
            align-items: center;
            padding: 12px 18px;
            border-radius: 999px;
            border: 1px solid var(--border);
            font-weight: 600;
            font-size: 1rem;
            line-height: 1.2;
        }

        .hero-badge,
        .hero-subline {
            background: linear-gradient(180deg, #fff8ef 0%, #ffeccf 100%);
            border-color: #f1d8b3;
            color: var(--text);
            box-shadow: 0 8px 24px rgba(239, 167, 52, 0.1);
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease;
        }

        .hero-badge:hover,
        .hero-subline:hover {
            transform: translateY(-2px);
            background: linear-gradient(180deg, #fff5e4 0%, #ffe0b5 100%);
            border-color: #ebb86d;
            box-shadow: 0 14px 30px rgba(239, 167, 52, 0.16);
        }

        .section-badge {
            background: var(--accent-pale);
            border-color: transparent;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 18px;
        }

        .hero-subline {
            margin-top: 24px;
        }

        .hero-image {
            border-radius: 28px;
            overflow: hidden;
            background: var(--accent-pale);
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            display: block;
        }

        .about-image {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border);
            background: #dde8f0;
        }

        .about-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: 60% center;
            display: block;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            color: var(--text);
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--accent-pale);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            flex-shrink: 0;
        }

        .service-card,
        .animal-card,
        .review-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            box-shadow: var(--shadow-soft);
        }

        .service-card,
        .animal-card {
            transition: transform 0.28s ease, box-shadow 0.28s ease, border-color 0.28s ease, background 0.28s ease;
        }

        .service-card {
            padding: 24px;
        }

        .review-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 34px rgba(36, 57, 90, 0.1);
        }

        .service-card:hover,
        .animal-card:hover {
            transform: translateY(-6px);
            border-color: rgba(239, 167, 52, 0.38);
            box-shadow: var(--shadow-glow);
            background: linear-gradient(180deg, #ffffff 0%, #fffaf2 100%);
        }

        .service-icon,
        .animal-icon {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            background: var(--accent-pale);
            border: 1px solid rgba(10, 125, 185, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            margin-bottom: 18px;
            transition: transform 0.28s ease, box-shadow 0.28s ease, background 0.28s ease, color 0.28s ease, border-color 0.28s ease;
        }

        .service-card:hover .service-icon,
        .animal-card:hover .animal-icon {
            background: linear-gradient(180deg, #fff4df 0%, #ffe7c0 100%);
            color: #c67e14;
            border-color: rgba(239, 167, 52, 0.36);
            box-shadow: 0 12px 26px rgba(239, 167, 52, 0.2);
            transform: translateY(-2px) scale(1.06);
        }

        .animal-card {
            padding: 28px 20px;
            text-align: center;
        }

        .animal-card h3 {
            font-size: 1.05rem;
            line-height: 1.3;
        }

        .review-card {
            padding: 24px 22px;
            height: 100%;
        }

        .review-card .review-text {
            color: var(--text);
            font-size: 1.04rem;
            line-height: 1.65;
            margin-bottom: 16px;
        }

        .review-card .review-author {
            color: #8a98ad;
            font-size: 0.88rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .contact-card {
            background: var(--bg-blue-card);
            border: 1px solid var(--border);
            border-radius: 30px;
            box-shadow: var(--shadow);
            padding: 38px;
        }

        .contact-inner-card {
            background: var(--bg-blue-card-soft);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 28px;
        }

        .contact-item {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .contact-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .contact-label {
            font-size: 1.18rem;
            font-weight: 700;
            color: var(--text-deep);
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .contact-value {
            font-size: 1.08rem;
            font-weight: 600;
            color: var(--text-deep);
            line-height: 1.45;
        }

        .contact-note,
        .contact-title,
        .contact-text {
            color: var(--text-deep);
        }

        .contact-note {
            line-height: 1.55;
            font-size: 1.08rem;
        }

        .contact-text {
            color: var(--text-soft);
        }

        .contact-button-wrap {
            margin-top: 28px;
        }

        .contact-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 290px;
            max-width: 320px;
            min-height: 58px;
            padding: 14px 28px;
            border-radius: 18px;
            background: linear-gradient(180deg, #1a90d1 0%, #0a7db9 100%);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            box-shadow: 0 12px 24px rgba(10, 125, 185, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .contact-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 28px rgba(10, 125, 185, 0.24);
            background: linear-gradient(180deg, #1390d7 0%, #086a9c 100%);
        }

        .map-frame {
            width: 100%;
            height: 340px;
            border: 0;
            border-radius: 20px;
            overflow: hidden;
            display: block;
            background: #eef5fb;
        }

        .mobile-map-fallback {
            display: none;
            text-decoration: none;
            border-radius: 20px;
            background: linear-gradient(180deg, #ffffff 0%, #f5f9fd 100%);
            border: 1px solid var(--border);
            padding: 22px;
            color: var(--text);
            box-shadow: var(--shadow-soft);
        }

        .mobile-map-fallback .map-fallback-title {
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
            font-size: 1.02rem;
        }

        .mobile-map-fallback .map-fallback-text {
            color: var(--text-soft);
            line-height: 1.5;
            font-size: 0.98rem;
        }

        .footer {
            background: var(--bg-blue-card);
            border-top: 1px solid var(--border);
        }

        .footer-inner {
            max-width: 980px;
        }

        .footer-wordmark {
            height: 82px;
            width: auto;
            display: block;
        }

        .mobile-menu {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.98);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 22px;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        }

        .mobile-menu.open {
            transform: translateX(0);
        }

        .mobile-menu .nav-link {
            font-size: 1.35rem;
        }

        .hamburger {
            width: 28px;
            height: 20px;
            position: relative;
            cursor: pointer;
            z-index: 1001;
            background: none;
            border: 0;
        }

        .hamburger span {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--text);
            transition: all 0.3s ease;
        }

        .hamburger span:nth-child(1) {
            top: 0;
        }

        .hamburger span:nth-child(2) {
            top: 9px;
        }

        .hamburger span:nth-child(3) {
            bottom: 0;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg);
            top: 9px;
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg);
            bottom: 9px;
        }

        .reveal {
            opacity: 0;
            transform: translateY(28px);
            transition: opacity 0.65s ease, transform 0.65s ease;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal-delay-1 {
            transition-delay: 0.08s;
        }

        .reveal-delay-2 {
            transition-delay: 0.16s;
        }

        .reveal-delay-3 {
            transition-delay: 0.24s;
        }

        .reveal-delay-4 {
            transition-delay: 0.32s;
        }

        a:focus-visible,
        button:focus-visible {
            outline: 3px solid var(--accent);
            outline-offset: 3px;
        }

        @media (max-width: 1023px) {
            .hero {
                padding-top: 118px;
                padding-bottom: 56px;
            }
        }

        @media (max-width: 767px) {
            .hero {
                padding-top: 104px;
                padding-bottom: 44px;
            }

            .hero-badge,
            .hero-subline,
            .section-badge {
                font-size: 0.97rem;
                padding: 12px 18px;
            }

            .hero-badge,
            .hero-subline {
                box-shadow: 0 10px 24px rgba(239, 167, 52, 0.12);
            }

            .hero-image {
                margin-top: 10px;
            }

            .top-phone-btn {
                padding: 12px 16px;
                font-size: 0.95rem;
            }

            .contact-card {
                padding: 24px;
            }

            .contact-inner-card {
                padding: 20px;
            }

            .contact-button-wrap {
                margin-top: 24px;
            }

            .contact-button {
                width: 100%;
                min-width: 0;
                max-width: none;
            }

            .map-frame {
                display: none;
            }

            .mobile-map-fallback {
                display: block;
            }

            .footer-wordmark {
                height: 72px;
            }
        }
    </style>
</head>
